<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PSA Valencia Open | Admin</title>

<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<div class="admin">

    <aside class="sidebar">

        <h2>ADMIN</h2>

        <nav>

            <a href="#">Dashboard</a>

            <a href="#">Noticias</a>

            <a href="#">Streaming</a>

            <a href="#">Sponsors</a>

            <a href="#">Galería</a>

            <a href="#">Banner</a>

            <a href="#">Configuración</a>

            <a href="#tournament-mode-panel">Torneo</a>

            <a href="#">Idiomas</a>

        </nav>

    </aside>

    <main class="content">

        <h1>Panel de Administración</h1>

        <p>

            Bienvenido al panel del PSA Valencia Open.

        </p>

        <section class="admin-card" id="tournament-mode-panel">
            <h2>Contenido Torneo</h2>
            <p class="admin-muted">Elige la version manual o la version conectada por API.</p>

            <div class="option-group">
                <label>
                    <input type="radio" name="tournamentMode" value="manual">
                    Version manual (texto fijo)
                </label>
                <label>
                    <input type="radio" name="tournamentMode" value="api">
                    Version API (contenido remoto)
                </label>
            </div>

            <label for="tournamentApiUrl" class="field-label">URL API (opcional)</label>
            <input id="tournamentApiUrl" type="url" placeholder="https://tu-api.com/tournament-content">

            <button id="saveTournamentSettings" type="button">Guardar configuracion</button>
            <p id="adminStatus" class="admin-status" aria-live="polite"></p>
        </section>

    </main>

</div>

<script src="js/admin.js"></script>

</body>

</html>
